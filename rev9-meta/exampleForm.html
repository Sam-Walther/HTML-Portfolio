<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>example form</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
    </head>
    <body>
        <form action="">  <!-- action is what happens when submitted? -->
            <label for="first">First Name: </label>
            <input type="text" name="firstName" id="first" required><br>
            <label for="last">Last Name:</label>
            <input type="text" name="lastName" id="last"><br>
            <label for="email">Email:</label>
            <input type="email" name="emailAddress" id="email"><br>
            <label for="phone">Mobile:</label>
            <input type="tel" name="phoneNumber" id="phone"><br>
            <label for="address">Address</label>
            <input type="text" name="streetAddress" id="address"><br>
            <label for="city">City:</label>
            <input type="text" name="city" id="city"><br>
            
            <label for="st">State:</label>
            <input type="text" name="states" id="st" list="stateList"><br>
            <datalist id="stateList">
                <option value="IN" label="IN">
                <option value="FL" label="FL">
                <option value="VT" label="VT">
            </datalist>
            
            <label for="zip">Zip:</label>
            <input type="number" name="zipCode" id="zip"><br>
            <label for="myDate">Date of Issue</label>
            <input type="date" id="myDate">
            <br>
            <input type="submit"> <input type="reset">
        </form>
    </body>
</html>
